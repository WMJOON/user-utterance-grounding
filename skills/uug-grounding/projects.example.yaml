# projects.yaml 템플릿 — 이 파일을 projects.yaml 로 복사하고 본인 프로젝트를 등록한다.
# (projects.yaml 은 본인 환경의 프로젝트 레지스트리. 이 example 은 추상화/배포용 샘플.)
#
# 각 항목:
#   anchor   : machine.yaml 의 앵커명 (vault/code/home 등). 위치의 머신-무관 기준점.
#   rel      : 앵커 상대경로.
#   keywords : target_project 추론용 자연어 트리거 (발화에 이 단어 등장 시 이 프로젝트로 grounding).
#   tags     : 분류용(선택).
#   intent_registry : (선택) 그 프로젝트의 *도메인* intent TTL (프로젝트 루트 anchor+rel 상대경로).
#                     선언 시 grounding 이 user intent + 그 도메인 intent 를 합쳐 ground 한다
#                     (§11 멀티-레지스트리 브리지). 도메인 intent 가 매칭되면 target_project 함의.
#                     레지스트리는 namespace 무관(술어 로컬명 기준) — MSO mso: 등 그대로 사용.
# ※ 절대경로는 여기 두지 않는다 → machine.yaml(로컬)이 anchor→절대경로.
# ※ intent 정의는 여기 아님 → instances/user_intents.ttl.

my-main-repo:
  anchor: vault
  rel: path/to/main-repo
  keywords: ["메인", "main repo", "별칭"]
  tags: [example]

my-knowledge-base:
  anchor: vault
  rel: path/to/kb
  keywords: ["KB", "지식베이스", "노트"]
  tags: [example, knowledge-base]

# 도메인 레지스트리 브리지 예시 — 이 프로젝트의 운영 intent(예: MSO dispatch_ticket)를
# UUG 가 ground 할 수 있게 한다.
my-orchestrator:
  anchor: vault
  rel: path/to/orchestrator
  keywords: ["오케스트레이터", "티켓", "dispatch"]
  tags: [example, orchestrator]
  intent_registry: repository/skills/intent-registry/instances/intents.ttl
